<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Arena RPG</title>
    <style>
        body { background: #0f0f1a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1c1c2d; padding: 30px; border-radius: 20px; text-align: center; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #8e44ad; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #2a2a40; color: white; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 12px; margin-top: 15px; background: #8e44ad; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #9b59b6; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <h2>⚔️ Entrar na Batalha</h2>
        <input type="text" id="nome" placeholder="Digite seu Nickname">
        
        <select id="disciplina">
            <option value="" disabled selected>Escolha a Disciplina...</option>
            <option value="matematica">Matemática</option>
            <option value="portugues">Português</option>
            <option value="biologia">Biologia</option>
            <option value="historia">História</option>
            <option value="geografia">Geografia</option>
            <option value="fisica">Física</option>
            <option value="quimica">Química</option>
        </select>

        <button id="btnEntrar">AVANÇAR</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {apiKey: "AIzaSyAtKHigv0ghzwzMilQ1y0NTebpmaI2yE2A",
    authDomain: "yvypoty-491e8.firebaseapp.com",
    projectId: "yvypoty-491e8",
    storageBucket: "yvypoty-491e8.firebasestorage.app",
    messagingSenderId: "338156073833",
    appId: "1:338156073833:web:ca0d8ede1456dad29243f8",
    measurementId: "G-W93E7TJ59V"};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('btnEntrar').onclick = async () => {
            const nick = document.getElementById('nome').value.trim();
            const disciplina = document.getElementById('disciplina').value;

            if (nick && disciplina) {
                // Salva na gaveta correta da disciplina
                await setDoc(doc(db, "salas", disciplina, "jogadores", nick), { acertos: 0, status: "online", sprite: "⏳" });
                
                // Salva no celular para as próximas telas lembrarem
                localStorage.setItem("usuarioAtivo", nick);
                localStorage.setItem("disciplinaAtiva", disciplina);
                
                window.location.href = "selecao.html";
            } else {
                alert("Por favor, digite seu nome e escolha a disciplina!");
            }
        };
    </script>
</body>
</html>
