<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG - Respondendo</title>
    <style>
        :root { --primary: #6200ea; --secondary: #03dac6; --danger: #cf6679; --bg: #121212; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        
        #arena { width: 90%; max-width: 500px; background: #1e1e1e; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; border: 2px solid #333;}
        
        #player-corner { position: absolute; top: -30px; left: -10px; font-size: 60px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        #status-bar { color: var(--gold); font-weight: bold; margin-bottom: 10px; font-size: 20px;}
        
        /* TELA DE AGUARDE (SEMÁFORO) */
        #tela-bloqueio { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; }
        .loader { border: 5px solid #333; border-top: 5px solid #8e44ad; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* TELA DE JOGO */
        #tela-quiz { display: none; }
        #question-box { background: #2c2c2c; padding: 20px; border-radius: 10px; margin-bottom: 20px; font-size: 18px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border: none; border-radius: 8px; background: #3d3d3d; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: var(--primary); }
    </style>
</head>
<body>

<div id="arena">
    <div id="player-corner">👤</div>
    <div id="status-bar">Casas Avançadas: <span id="pontos-ui">0</span></div>

    <div id="tela-bloqueio">
        <div class="loader"></div>
        <h2 style="color:#f39c12;">Aguarde o professor dar o PLAY para a batalha iniciar!</h2>
    </div>

    <div id="tela-quiz">
        <div id="question-box"><p id="txt-pergunta">Carregando...</p></div>
        <div class="options" id="btn-options"></div>
        <p id="feedback-msg" style="font-weight:bold; height: 20px;"></p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, getDoc, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {apiKey: "AIzaSyAtKHigv0ghzwzMilQ1y0NTebpmaI2yE2A",
    authDomain: "yvypoty-491e8.firebaseapp.com",
    projectId: "yvypoty-491e8",
    storageBucket: "yvypoty-491e8.firebasestorage.app",
    messagingSenderId: "338156073833",
    appId: "1:338156073833:web:ca0d8ede1456dad29243f8",
    measurementId: "G-W93E7TJ59V"};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const nick = localStorage.getItem("usuarioAtivo");
    const disciplina = localStorage.getItem("disciplinaAtiva");
    const meuSprite = localStorage.getItem("meuHeroi");
    
    if (!nick || !disciplina) { window.location.href = "index.html"; }

    document.getElementById('player-corner').innerText = meuSprite;
    let perguntas = [];
    let pontosAtuais = 0;

    // 1. ESCUTA O SEMÁFORO DO PROFESSOR (PLAY/PAUSE)
    onSnapshot(doc(db, "salas", disciplina, "configuracao", "estado"), (docSnap) => {
        const dados = docSnap.data();
        if (dados && dados.jogando === true) {
            // VERDE! Mostra perguntas
            document.getElementById('tela-bloqueio').style.display = 'none';
            document.getElementById('tela-quiz').style.display = 'block';
            if(perguntas.length === 0) loadQuestions();
        } else {
            // VERMELHO! Esconde perguntas
            document.getElementById('tela-bloqueio').style.display = 'flex';
            document.getElementById('tela-quiz').style.display = 'none';
        }
    });

    // 2. BUSCA AS PERGUNTAS E RENDERIZA
    async function loadQuestions() {
        const snap = await getDocs(collection(db, "salas", disciplina, "perguntas"));
        perguntas = snap.docs.map(d => d.data());
        renderQuestion();
    }

    function renderQuestion() {
        if (perguntas.length === 0) { document.getElementById('txt-pergunta').innerText = "Sem missões no momento."; return; }
        const q = perguntas[Math.floor(Math.random() * perguntas.length)];
        document.getElementById('txt-pergunta').innerText = q.enunciado;
        const container = document.getElementById('btn-options');
        container.innerHTML = "";
        q.opcoes.forEach((opt, idx) => {
            const btn = document.createElement('button'); btn.innerText = opt;
            btn.onclick = () => check(idx, q.correta);
            container.appendChild(btn);
        });
    }

    // 3. A LÓGICA DE GANHAR OU PERDER CASAS
    async function check(choice, correct) {
        const fb = document.getElementById('feedback-msg');
        const refJogador = doc(db, "salas", disciplina, "jogadores", nick);
        
        const docSnap = await getDoc(refJogador);
        pontosAtuais = docSnap.exists() ? (docSnap.data().acertos || 0) : 0;

        if (choice === correct) {
            pontosAtuais += 1;
            fb.innerText = "✨ Certo! Avançou 1 casa!"; fb.style.color = "#03dac6";
        } else {
            pontosAtuais = Math.max(0, pontosAtuais - 1);
            fb.innerText = "❌ Errou! Voltou 1 casa!"; fb.style.color = "#cf6679";
        }

        document.getElementById('pontos-ui').innerText = pontosAtuais;
        await updateDoc(refJogador, { acertos: pontosAtuais });

        document.getElementById('btn-options').innerHTML = ""; // Esconde para não clicar 2x
        setTimeout(() => { fb.innerText = ""; renderQuestion(); }, 2000);
    }
</script>
</body>
</html>
