<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha de Perguntas</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .questao { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #333; }
        .btn-opt { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #333; color: white; border-radius: 8px; border: none; cursor: pointer; }
        .btn-opt:hover { background: #6200ea; }
    </style>
</head>
<body>
    <h2 id="boasVindas"></h2>
    <div class="questao">
        <h3 id="perguntaTexto">Carregando pergunta...</h3>
        <div id="opcoes"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {apiKey: "AIzaSyAtKHigv0ghzwzMilQ1y0NTebpmaI2yE2A",
    authDomain: "yvypoty-491e8.firebaseapp.com",
    projectId: "yvypoty-491e8",
    storageBucket: "yvypoty-491e8.firebasestorage.app",
    messagingSenderId: "338156073833",
    appId: "1:338156073833:web:ca0d8ede1456dad29243f8",
    measurementId: "G-W93E7TJ59V"};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const nome = localStorage.getItem("usuario");
        document.getElementById('boasVindas').innerText = `Guerreiro: ${nome}`;

        async function responder(correta, selecionada) {
            if (correta === selecionada) {
                await updateDoc(doc(db, "jogadores", nome), { acertos: increment(1) });
                alert("Correto! Seu personagem avançou!");
                location.reload(); // Simplesmente recarrega para pegar outra (pode ser melhorado)
            } else {
                alert("Errado! Tente novamente.");
            }
        }

        // Simulação de carregar a primeira pergunta da coleção "perguntas"
        const snap = await getDocs(collection(db, "perguntas"));
        const p = snap.docs[0].data(); // Pega a primeira pergunta do banco
        document.getElementById('perguntaTexto').innerText = p.enunciado;
        p.opcoes.forEach((opt, idx) => {
            const b = document.createElement('button');
            b.innerText = opt;
            b.className = 'btn-opt';
            b.onclick = () => responder(p.correta, idx);
            document.getElementById('opcoes').appendChild(b);
        });
    </script>
</body>
</html>
