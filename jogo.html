<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG de Conhecimento - Batalha</title>
    <style>
        :root { --primary: #6200ea; --secondary: #03dac6; --danger: #cf6679; --bg: #121212; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        #arena { width: 90%; max-width: 500px; background: #1e1e1e; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; border: 2px solid #333; position: relative; }
        
        /* Personagem no Canto */
        #player-corner { position: absolute; top: -25px; left: -10px; font-size: 60px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        #pontuacao-display { position: absolute; top: 10px; right: 20px; font-weight: bold; color: var(--secondary); font-size: 18px; }

        #question-box { background: #2c2c2c; padding: 20px; border-radius: 10px; margin-top: 30px; margin-bottom: 20px; min-height: 80px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border: none; border-radius: 8px; background: #3d3d3d; color: white; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 14px; }
        button:hover { background: var(--primary); transform: translateY(-2px); }
        .feedback { margin-top: 15px; font-weight: bold; font-size: 18px; height: 25px; }
    </style>
</head>
<body>

<div id="arena">
    <div id="player-corner">👤</div>
    <div id="pontuacao-display">Casas Avançadas: <span id="pontos-ui">0</span></div>

    <div id="question-box"><p id="txt-pergunta">Buscando pergaminhos da disciplina...</p></div>
    <div class="options" id="btn-options"></div>
    <p class="feedback" id="feedback-msg"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {apiKey: "AIzaSyAtKHigv0ghzwzMilQ1y0NTebpmaI2yE2A",
    authDomain: "yvypoty-491e8.firebaseapp.com",
    projectId: "yvypoty-491e8",
    storageBucket: "yvypoty-491e8.firebasestorage.app",
    messagingSenderId: "338156073833",
    appId: "1:338156073833:web:ca0d8ede1456dad29243f8",
    measurementId: "G-W93E7TJ59V"};
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // PUXANDO AS INFORMAÇÕES DO CELULAR DO ALUNO
    const nick = localStorage.getItem("usuarioAtivo");
    const disciplina = localStorage.getItem("disciplinaAtiva");
    const meuSprite = localStorage.getItem("meuHeroi");
    
    // TRAVA ANTI-LOOP (Se faltar algo, ele avisa antes de voltar)
    if (!nick || !disciplina || !meuSprite) {
        alert("⚠️ ATENÇÃO: Seus dados de login sumiram do celular! Voltando para o início.");
        window.location.href = "index.html";
        throw new Error("Parando execução por falta de dados.");
    }

    // Se passou da trava, o jogo continua normalmente:
    document.getElementById('player-corner').innerText = meuSprite;

    let perguntas = [];
    let pontosAtuais = 0;

    async function loadQuestions() {
        try {
            const snap = await getDocs(collection(db, "salas", disciplina, "perguntas"));
            perguntas = snap.docs.map(d => d.data());
            renderQuestion();
        } catch (erro) {
            alert("Erro ao buscar as perguntas: " + erro);
        }
    }

    function renderQuestion() {
        if (perguntas.length === 0) {
            document.getElementById('txt-pergunta').innerText = "Você respondeu todas as missões disponíveis!";
            document.getElementById('btn-options').innerHTML = "";
            return;
        }

        const q = perguntas[Math.floor(Math.random() * perguntas.length)];
        document.getElementById('txt-pergunta').innerText = q.enunciado;
        const container = document.getElementById('btn-options');
        container.innerHTML = "";

        q.opcoes.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => check(idx, q.correta);
            container.appendChild(btn);
        });
    }

    async function check(choice, correct) {
        const fb = document.getElementById('feedback-msg');
        const refJogador = doc(db, "salas", disciplina, "jogadores", nick);
        
        try {
            const docSnap = await getDoc(refJogador);
            if (docSnap.exists()) {
                pontosAtuais = docSnap.data().acertos || 0;
            }

            if (choice === correct) {
                pontosAtuais += 1;
                fb.innerText = "✨ Resposta Certa! Avançou 1 casa!"; 
                fb.style.color = "var(--secondary)";
            } else {
                pontosAtuais = Math.max(0, pontosAtuais - 1);
                fb.innerText = "❌ Resposta Errada! Voltou 1 casa!"; 
                fb.style.color = "var(--danger)";
            }

            document.getElementById('pontos-ui').innerText = pontosAtuais;
            await updateDoc(refJogador, { acertos: pontosAtuais });

            document.getElementById('btn-options').innerHTML = ""; 
            setTimeout(() => {
                fb.innerText = "";
                renderQuestion();
            }, 2000);

        } catch (erro) {
            console.error("Erro ao verificar resposta:", erro);
        }
    }

    loadQuestions();
</script>
</body>
</html>
