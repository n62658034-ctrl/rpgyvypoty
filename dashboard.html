<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Projetor - Arena PRO</title>
    <style>
        :root { --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; }
        body { margin: 0; background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        header { background: rgba(0,0,0,0.85); padding: 15px; text-align: center; border-bottom: 3px solid var(--gold); position: relative; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        h1 { margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* HUD & RANKING (Do seu código) */
        #hud { position: absolute; top: 80px; left: 15px; background: rgba(0,0,0,0.8); padding: 10px 15px; border-radius: 10px; font-size: 16px; font-weight: bold; z-index: 200; border: 1px solid var(--gold); }
        #ranking { position: absolute; right: 15px; top: 80px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; font-size: 16px; width: 220px; z-index: 200; border: 1px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .rank-item { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px;}

        #arena { position: relative; width: 100vw; height: 85vh; transition: background 1s ease-in-out; overflow: hidden; }
        
        /* EFEITO DE VELOCIDADE NO FUNDO (Integrado à Corrida Clássica) */
        .tema-corrida { background: linear-gradient(to bottom, #1e293b, #0f172a); border-bottom: 20px solid #334155; }
        .tema-corrida::before { content:""; position:absolute; width:200%; height:100%; background:radial-gradient(#00ffff33 1px, transparent 1px); background-size:40px 40px; animation:moveBg 20s linear infinite; }
        @keyframes moveBg { from { transform:translateX(0); } to { transform:translateX(-50%); } }
        
        /* OS SUPER CENÁRIOS */
        .tema-pixel { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><text x='20' y='280' font-size='120'>🍄</text><text x='150' y='100' font-size='60'>☁️</text></svg>"), linear-gradient(to bottom, #5c94fc, #87b4ff); border-bottom: 40px solid #c84c0c; box-shadow: inset 0 -15px 0 #00a800; }
        .tema-gelo { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'><text x='50' y='280' font-size='150'>🏔️</text><text x='250' y='280' font-size='100'>⛄</text></svg>"), linear-gradient(to bottom, #a1c4fd, #c2e9fb); border-bottom: 40px solid #fff; box-shadow: inset 0 -10px 0 #b2ebf2; }
        .tema-dragao { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='500' height='300'><text x='20' y='280' font-size='180'>🏰</text><text x='300' y='150' font-size='100'>🐉</text></svg>"), linear-gradient(to bottom, #2b1055, #7597de); border-bottom: 40px solid #111; box-shadow: inset 0 -15px 0 #e74c3c; }
        .tema-medieval { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'><text x='10' y='280' font-size='130'>🏘️</text><text x='200' y='280' font-size='150'>🕍</text></svg>"), linear-gradient(to bottom, #4ca1af, #c4e0e5); border-bottom: 40px solid #5d4037; }
        .tema-scifi { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'><text x='50' y='280' font-size='150'>🌃</text><text x='250' y='100' font-size='80'>🛸</text></svg>"), linear-gradient(to bottom, #0f0c29, #302b63, #24243e); border-bottom: 40px solid #000; box-shadow: inset 0 -5px 20px #00ffff; }
        .tema-inca { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'><text x='50' y='280' font-size='180'>🛕</text><text x='250' y='280' font-size='100'>🌴</text></svg>"), linear-gradient(to bottom, #11998e, #38ef7d); border-bottom: 40px solid #8d6e63; box-shadow: inset 0 -15px 0 #2e7d32; }
        .tema-dino { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='300'><text x='20' y='280' font-size='120'>🌋</text><text x='200' y='280' font-size='150'>🦖</text></svg>"), linear-gradient(to bottom, #ff7e5f, #feb47b); border-bottom: 40px solid #3e2723; box-shadow: inset 0 -20px 0 #1b5e20; }
        .tema-lego { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='300'><text x='50' y='280' font-size='100'>🧱</text></svg>"), background-color: #4fc3f7; border-bottom: 40px solid #e53935; box-shadow: inset 0 -20px 0 #fdd835; }

        .finish-line { position: absolute; right: 10%; bottom: 0; height: 100%; width: 50px; border-left: 5px dashed white; border-right: 5px dashed white; background: rgba(255, 215, 0, 0.2); display: flex; align-items: flex-start; justify-content: center; z-index: 5;}
        .finish-line::after { content: "🏁"; font-size: 50px; background: rgba(0,0,0,0.7); border-radius: 50%; padding: 10px; margin-top: 20px; box-shadow: 0 0 20px var(--gold); }

        /* BONECOS COM EFEITOS PRO */
        .player-container { position: absolute; transition: transform 0.6s cubic-bezier(.17,.67,.83,.67), bottom 0.6s ease; display: flex; flex-direction: column; align-items: center; z-index: 10; left: 0; }
        
        .player-container::after { content:""; position:absolute; width:60px; height:15px; background:linear-gradient(to right, transparent, var(--gold)); left:-60px; top:50%; opacity:0; filter:blur(4px); transition: 0.3s; }
        .player-container.movendo::after { opacity: 0.8; } /* O rastro só aparece quando acelera */

        .avatar { font-size: 60px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6)); }
        .name-tag { background: rgba(0,0,0,0.9); color: white; padding: 4px 10px; border-radius: 8px; font-size: 14px; font-weight: bold; margin-top: 5px; border: 1px solid rgba(255,255,255,0.2); }
        .score-bubble { background: var(--gold); color: #000; border-radius: 50%; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 16px; position: absolute; top: -20px; border: 3px solid black; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }

        /* ALERTAS E PÓDIO */
        #alerta-chegada { position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 3px solid var(--gold); color: white; font-size: 30px; font-weight: bold; padding: 20px 40px; border-radius: 20px; z-index: 2000; display: none; text-align: center; box-shadow: 0 10px 30px rgba(255, 215, 0, 0.5); animation: popIn 0.3s ease-out; }
        @keyframes popIn { 0% { transform: translate(-50%, -100%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        #podio-tela { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; }
        .podio-container { display: flex; align-items: flex-end; justify-content: center; gap: 20px; height: 400px; margin-top: 50px; }
        .lugar { display: flex; flex-direction: column; align-items: center; width: 150px; }
        .lugar .avatar { font-size: 80px; margin-bottom: 10px; animation: bounce 2s infinite; }
        .lugar .nome { font-size: 24px; font-weight: bold; margin-bottom: 10px; text-align: center; color: white; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px;}
        .pilar { width: 100%; display: flex; align-items: flex-start; justify-content: center; font-size: 50px; font-weight: bold; padding-top: 20px; border-radius: 15px 15px 0 0; box-shadow: inset 0 10px 20px rgba(255,255,255,0.3); }
        .pilar-1 { height: 250px; background: linear-gradient(to bottom, var(--gold), #b8860b); color: #fff; text-shadow: 0 2px 4px #000; }
        .pilar-2 { height: 180px; background: linear-gradient(to bottom, var(--silver), #7f8c8d); color: #fff; text-shadow: 0 2px 4px #000; }
        .pilar-3 { height: 130px; background: linear-gradient(to bottom, var(--bronze), #8d6e63); color: #fff; text-shadow: 0 2px 4px #000; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .confetti { position: absolute; width: 10px; height: 10px; animation: fall linear forwards; z-index: 3001; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }
    </style>
</head>
<body>

<audio id="som-ponto" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="som-vitoria" src="https://actions.google.com/sounds/v1/crowds/cheer.ogg"></audio>

<div id="alerta-chegada">🎉 <span id="nome-chegada"></span> CRUZOU A LINHA! 🎉</div>

<div id="hud">🏁 Meta: 10 Casas | Guerreiros: <span id="total-jogadores" style="color:var(--gold);">0</span></div>
<div id="ranking">
    <div style="text-align:center; color:var(--gold); margin-bottom:10px;">🏆 RANKING AO VIVO</div>
    <div id="lista-ranking"></div>
</div>

<div id="podio-tela">
    <h1 style="color: var(--gold); font-size: 60px; text-shadow: 0 5px 15px rgba(255,215,0,0.5); margin:0;">🏆 CAMPEÕES DA BATALHA 🏆</h1>
    <div class="podio-container">
        <div class="lugar" id="lugar-2" style="opacity: 0;"><div class="avatar" id="avatar-2">👤</div><div class="nome" id="nome-2">---</div><div class="pilar pilar-2">2º</div></div>
        <div class="lugar" id="lugar-1" style="opacity: 0;"><div class="avatar" id="avatar-1">👤</div><div class="nome" id="nome-1">---</div><div class="pilar pilar-1">1º</div></div>
        <div class="lugar" id="lugar-3" style="opacity: 0;"><div class="avatar" id="avatar-3">👤</div><div class="nome" id="nome-3">---</div><div class="pilar pilar-3">3º</div></div>
    </div>
</div>

<header>
    <h1>⚔️ ARENA DE <span id="titulo-sala" style="color:var(--gold);">---</span> ⚔️</h1>
</header>

<div id="arena">
    <div class="finish-line"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {apiKey: "AIzaSyAtKHigv0ghzwzMilQ1y0NTebpmaI2yE2A",
    authDomain: "yvypoty-491e8.firebaseapp.com",
    projectId: "yvypoty-491e8",
    storageBucket: "yvypoty-491e8.firebasestorage.app",
    messagingSenderId: "338156073833",
    appId: "1:338156073833:web:ca0d8ede1456dad29243f8",
    measurementId: "G-W93E7TJ59V"};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    const disciplina = localStorage.getItem("disciplinaAtiva");
    const tema = localStorage.getItem("temaAtivo") || "tema-corrida";
    if(!disciplina) { alert("Erro de conexão. Inicie pelo painel do professor."); }

    document.getElementById('titulo-sala').innerText = disciplina.toUpperCase();
    document.getElementById('arena').className = tema; 

    // DICA PARA O PROFESSOR SOBRE O ÁUDIO
    document.body.addEventListener('click', () => {
        // Isso "destrava" o áudio no Chrome para tocar sozinho depois
        document.getElementById("som-ponto").load();
    }, { once: true });

    const players = {};
    const META_PONTOS = 10; 
    let vencedores = []; 
    let podioExibido = false;

    function mostrarAlertaCruzamento(nome) {
        document.getElementById('nome-chegada').innerText = nome.toUpperCase();
        document.getElementById('alerta-chegada').style.display = 'block';
        setTimeout(() => { document.getElementById('alerta-chegada').style.display = 'none'; }, 2000);
    }

    function dispararConfetes() {
        const cores = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffd700'];
        for(let i = 0; i < 150; i++) {
            let confete = document.createElement('div');
            confete.className = 'confetti';
            confete.style.left = Math.random() * 100 + 'vw';
            confete.style.backgroundColor = cores[Math.floor(Math.random() * cores.length)];
            confete.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.getElementById('podio-tela').appendChild(confete);
        }
    }

    function exibirPodioFinal() {
        if(podioExibido) return;
        podioExibido = true;
        document.getElementById('podio-tela').style.display = 'flex';
        
        if(vencedores[0]) { document.getElementById('nome-1').innerText = vencedores[0].nome; document.getElementById('avatar-1').innerText = vencedores[0].icone; setTimeout(() => document.getElementById('lugar-1').style.opacity = '1', 500); }
        if(vencedores[1]) { document.getElementById('nome-2').innerText = vencedores[1].nome; document.getElementById('avatar-2').innerText = vencedores[1].icone; setTimeout(() => document.getElementById('lugar-2').style.opacity = '1', 1000); }
        if(vencedores[2]) { document.getElementById('nome-3').innerText = vencedores[2].nome; document.getElementById('avatar-3').innerText = vencedores[2].icone; setTimeout(() => document.getElementById('lugar-3').style.opacity = '1', 1500); }
        dispararConfetes();
    }

    function atualizarRanking(listaDocs) {
        let ranking = [];
        listaDocs.forEach(doc => {
            let d = doc.data();
            ranking.push({ nome: doc.id, pontos: d.acertos || 0 });
        });
        
        ranking.sort((a,b) => b.pontos - a.pontos); // Ordena do maior para o menor
        
        const htmlRanking = ranking.slice(0, 8).map((p, i) => {
            let cor = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "#cd7f32" : "white";
            return `<div class="rank-item" style="color:${cor};"><span>${i+1}º ${p.nome}</span> <span>${p.pontos}</span></div>`;
        }).join("");
        
        document.getElementById('lista-ranking').innerHTML = htmlRanking;
    }

    onSnapshot(collection(db, "salas", disciplina, "jogadores"), (snapshot) => {
        document.getElementById("total-jogadores").innerText = snapshot.docs.length;
        atualizarRanking(snapshot.docs); // O RANKING CORRIGIDO
        
        snapshot.docChanges().forEach((change) => {
            const dados = change.doc.data();
            const nome = change.doc.id;
            let acertos = dados.acertos || 0;
            let icone = dados.sprite || "⏳";

            if(change.type === "removed") { location.reload(); return; }

            if (!players[nome]) {
                const container = document.createElement('div');
                container.id = `p-${nome}`;
                container.className = 'player-container';
                container.innerHTML = `<div class="score-bubble" id="score-${nome}">0</div><div class="avatar" id="avatar-${nome}">${icone}</div><div class="name-tag">${nome}</div>`;
                document.getElementById('arena').appendChild(container);
                players[nome] = { nome: nome, icone: icone, terminou: false, pontosAntigos: 0 };
            } else {
                document.getElementById(`avatar-${nome}`).innerText = icone;
                players[nome].icone = icone;
            }

            const pElement = document.getElementById(`p-${nome}`);
            document.getElementById(`score-${nome}`).innerText = acertos;
            
            // LÓGICA DE MOVIMENTO VIA TRANSFORM X
            let posVW = 2 + (acertos * 8.5);
            if (posVW > 85) posVW = 85; 
            pElement.style.transform = `translateX(${posVW}vw)`;

            // DISTRIBUIÇÃO VERTICAL
            if (tema !== 'tema-corrida') {
                pElement.style.bottom = `${15 + (acertos * 5)}%`;
            } else {
                let hash = nome.length * 5; 
                pElement.style.top = `${20 + (hash % 50)}%`; 
            }

            // EFEITO DE BOOST (Ao ganhar ponto)
            if(acertos > players[nome].pontosAntigos && acertos > 0) {
                pElement.classList.add("movendo"); // Liga o rastro
                pElement.animate([{transform: `translateX(${posVW}vw) scale(1)`}, {transform: `translateX(${posVW}vw) scale(1.4)`}, {transform: `translateX(${posVW}vw) scale(1)`}], {duration: 400});
                
                // Toca som apenas se o professor clicou na tela antes
                const som = document.getElementById("som-ponto");
                som.currentTime = 0;
                som.play().catch(e => console.log("Clique na tela para habilitar o som."));
                
                setTimeout(() => pElement.classList.remove("movendo"), 600);
            }
            players[nome].pontosAntigos = acertos;

            // LÓGICA DO PÓDIO
            if (acertos >= META_PONTOS && !players[nome].terminou) {
                players[nome].terminou = true;
                vencedores.push({ nome: nome, icone: icone });
                mostrarAlertaCruzamento(nome);
                
                const somVitoria = document.getElementById("som-vitoria");
                somVitoria.play().catch(e => {});

                if (vencedores.length === 3 || vencedores.length === snapshot.docs.length) {
                    setTimeout(() => { exibirPodioFinal(); }, 2500); 
                }
            }
        });
    });
</script>
</body>
</html>
