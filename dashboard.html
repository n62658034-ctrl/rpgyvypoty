<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Batalha Real-Time</title>
    <style>
        :root { --grama: #2e7d32; --pista: #455a64; --gold: #ffd700; }
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        
        header { background: rgba(0,0,0,0.8); padding: 10px; text-align: center; border-bottom: 3px solid var(--gold); }
        
        #arena { 
            position: relative; 
            width: 100vw; 
            height: 75vh; 
            background: linear-gradient(to bottom, #2c3e50, #000);
            border-bottom: 10px solid var(--pista);
            padding-top: 50px;
        }

        .player-container {
            position: absolute;
            left: 50px;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .avatar { font-size: 45px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        
        .name-tag {
            background: rgba(255,255,255,0.9);
            color: black;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: bold;
            margin-top: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .score-bubble {
            background: var(--gold);
            color: #000;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            position: absolute;
            top: -25px;
            animation: pulse 1s infinite;
            border: 2px solid black;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        #finish-line {
            position: absolute;
            right: 120px;
            height: 100%;
            width: 30px;
            background: repeating-linear-gradient(45deg, #fff, #fff 10px, #000 10px, #000 20px);
            opacity: 0.4;
            border-left: 2px solid white;
        }

        #podio { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; 
            align-items: center; justify-content: center; color: var(--gold); 
        }

        #admin-menu {
            position: fixed; bottom: 15px; right: 15px; opacity: 0.1; transition: 0.4s;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; display: flex; gap: 10px; z-index: 2000;
        }
        #admin-menu:hover { opacity: 1; }
        .admin-btn { cursor: pointer; padding: 8px 12px; border-radius: 5px; border: none; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<div id="podio">
    <h1 style="font-size: 120px; margin: 0;">🏆</h1>
    <h1 id="vencedor-nome" style="font-size: 60px; text-transform: uppercase;">NOME</h1>
    <h2 style="color: white;">CONQUISTOU A VITÓRIA SUPREMA!</h2>
    <button onclick="location.reload()" style="margin-top:30px; padding: 15px 40px; font-size: 20px; cursor: pointer; border-radius: 50px; border: none; background: var(--gold); color: black; font-weight: bold;">REINICIAR BATALHA</button>
</div>

<header>
    <h1>🏆 GRANDE BATALHA DO CONHECIMENTO 🏆</h1>
    <p>Guerreiros na Arena: <span id="count" style="color:var(--gold); font-size: 1.2em;">0</span> | Alvo: 10 Pontos</p>
</header>

<div id="arena">
    <div id="finish-line"></div>
</div>

<div id="admin-menu">
    <button class="admin-btn" onclick="window.location.href='index.html'" style="background: #3498db; color: white;">Página de Login</button>
    <button class="admin-btn" onclick="window.location.href='admin.html'" style="background: #8e44ad; color: white;">Cadastrar Perguntas</button>
    <button class="admin-btn" onclick="resetarTudo()" style="background: #e74c3c; color: white;">LIMPAR ARENA (RESET)</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {apiKey: "AIzaSyAtKHigv0ghzwzMilQ1y0NTebpmaI2yE2A",
    authDomain: "yvypoty-491e8.firebaseapp.com",
    projectId: "yvypoty-491e8",
    storageBucket: "yvypoty-491e8.firebasestorage.app",
    messagingSenderId: "338156073833",
    appId: "1:338156073833:web:ca0d8ede1456dad29243f8",
    measurementId: "G-W93E7TJ59V"};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const arena = document.getElementById('arena');
    const players = {};

    // MELHORIA: A função agora recebe o objeto 'dados' inteiro para ler o Sprite e os Acertos
    function atualizarOuCriarJogador(nome, dados) {
        let acertos = dados.acertos || 0;
        let icone = dados.sprite || "⏳"; // Mostra ampulheta se ele ainda estiver escolhendo

        if (!players[nome]) {
            const container = document.createElement('div');
            container.id = `p-${nome}`;
            container.className = 'player-container';
            container.style.top = (Math.random() * 65 + 10) + "%";
            
            container.innerHTML = `
                <div class="score-bubble" id="score-${nome}">0</div>
                <div class="avatar" id="avatar-${nome}">${icone}</div>
                <div class="name-tag">${nome}</div>
            `;
            
            arena.appendChild(container);
            players[nome] = true;
            document.getElementById('count').innerText = Object.keys(players).length;
        } else {
            // Atualiza o desenho se ele escolheu o herói depois de entrar
            document.getElementById(`avatar-${nome}`).innerText = icone;
        }

        const pElement = document.getElementById(`p-${nome}`);
        const sElement = document.getElementById(`score-${nome}`);
        
        // MELHORIA: Move o boneco baseado na quantidade de acertos
        const novaPosicao = 50 + (acertos * (window.innerWidth / 12.5)); 
        pElement.style.left = novaPosicao + "px";
        sElement.innerText = acertos;

        // Pula apenas quando o aluno pontua
        if(acertos > 0) {
            pElement.style.marginTop = "-25px";
            setTimeout(() => pElement.style.marginTop = "0px", 250);
        }

        if (acertos >= 10) {
            document.getElementById('vencedor-nome').innerText = nome;
            document.getElementById('podio').style.display = 'flex';
        }
    }

    onSnapshot(collection(db, "jogadores"), (snapshot) => {
        snapshot.docChanges().forEach((change) => {
            const dados = change.doc.data();
            const nome = change.doc.id;
            atualizarOuCriarJogador(nome, dados);
        });
    });

    window.resetarTudo = async () => {
        if(confirm("ATENÇÃO: Isso vai expulsar todos da arena, zerar os personagens ocupados e zerar o placar. Continuar?")) {
            // Limpa jogadores
            const queryJogadores = await getDocs(collection(db, "jogadores"));
            const promessasJogadores = queryJogadores.docs.map(d => deleteDoc(doc(db, "jogadores", d.id)));
            await Promise.all(promessasJogadores);
            
            // Limpa os personagens ocupados
            await updateDoc(doc(db, "configuracao", "personagens"), {
                mago: "", elfo: "", guerreiro: "", ninja: "", robo: "", vampiro: ""
            });

            alert("Arena completamente limpa!");
            location.reload();
        }
    }
</script>
</body>
</html>
