<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Batalha Real-Time</title>
    <style>
        :root { --grama: #2e7d32; --pista: #455a64; }
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Cabeçalho */
        header { background: rgba(0,0,0,0.8); padding: 10px; text-align: center; border-bottom: 3px solid #ffd700; }
        
        /* Arena de Batalha */
        #arena { 
            position: relative; 
            width: 100vw; 
            height: 75vh; 
            background: linear-gradient(to bottom, #2c3e50, #000);
            border-bottom: 10px solid var(--pista);
            padding-top: 50px;
        }

        /* Personagem */
        .player-container {
            position: absolute;
            left: 50px;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar { font-size: 40px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        
        .name-tag {
            background: rgba(255,255,255,0.9);
            color: black;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
        }

        .score-bubble {
            background: #ffd700;
            color: #000;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            position: absolute;
            top: -20px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Linha de Chegada */
        #finish-line {
            position: absolute;
            right: 100px;
            height: 100%;
            width: 20px;
            background: repeating-linear-gradient(45deg, #fff, #fff 10px, #000 10px, #000 20px);
            opacity: 0.3;
        }

        /* Pódio de Vitória */
        #podio { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 100; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: gold; 
        }
    </style>
</head>
<body>

<div id="podio">
    <h1 style="font-size: 100px; margin: 0;">🏆</h1>
    <h1 id="vencedor-nome" style="font-size: 50px;">NOME</h1>
    <h2>VENCEU A BATALHA DO CONHECIMENTO!</h2>
    <button onclick="location.reload()" style="padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 10px; border: none; background: gold; color: black; font-weight: bold;">Nova Partida</button>
</div>

<header>
    <h1>🏆 GRANDE BATALHA DO CONHECIMENTO 🏆</h1>
    <p>Alunos conectados: <span id="count">0</span> | Objetivo: 10 Acertos</p>
</header>

<div id="arena">
    <div id="finish-line"></div>
</div>

<script type="module">
    // --- CONEXÃO FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        /* COLOQUE SUAS CHAVES AQUI */
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- LÓGICA DO JOGO ---
    const arena = document.getElementById('arena');
    const players = {};
    const emojis = ["🧙‍♂️", "🧝‍♀️", "🦸‍♂️", "🥷", "🤖", "🧛‍♂️"];

    function atualizarOuCriarJogador(nome, acertos) {
        if (!players[nome]) {
            const container = document.createElement('div');
            container.id = `p-${nome}`;
            container.className = 'player-container';
            container.style.top = (Math.random() * 60 + 10) + "%";
            
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            container.innerHTML = `
                <div class="score-bubble" id="score-${nome}">0</div>
                <div class="avatar">${randomEmoji}</div>
                <div class="name-tag">${nome}</div>
            `;
            
            arena.appendChild(container);
            players[nome] = true;
            document.getElementById('count').innerText = Object.keys(players).length;
        }

        const pElement = document.getElementById(`p-${nome}`);
        const sElement = document.getElementById(`score-${nome}`);
        
        // Cálculo de movimento: 50px inicial + (acertos * 8% da largura da tela)
        const novaPosicao = 50 + (acertos * (window.innerWidth / 13)); 
        pElement.style.left = novaPosicao + "px";
        sElement.innerText = acertos;

        // Efeito de "pulo"
        pElement.style.marginTop = "-20px";
        setTimeout(() => pElement.style.marginTop = "0px", 200);

        // Verificação de Vitória
        if (acertos >= 10) {
            document.getElementById('vencedor-nome').innerText = nome;
            document.getElementById('podio').style.display = 'flex';
        }
    }

    // ESCUTA EM TEMPO REAL
    onSnapshot(collection(db, "jogadores"), (snapshot) => {
        snapshot.docChanges().forEach((change) => {
            const dados = change.doc.data();
            const nome = change.doc.id;
            atualizarOuCriarJogador(nome, dados.acertos);
        });
    });
</script>
</body>
</html>
