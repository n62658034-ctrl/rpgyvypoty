<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RPG Educativo</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; }
        button { width: 100%; padding: 12px; background: #6200ea; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Entrar na Arena</h2>
        <input type="text" id="nome" placeholder="Seu Nome ou Apelido">
        <button id="btnEntrar">INICIAR JOGO</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {apiKey: "AIzaSyAtKHigv0ghzwzMilQ1y0NTebpmaI2yE2A",
    authDomain: "yvypoty-491e8.firebaseapp.com",
    projectId: "yvypoty-491e8",
    storageBucket: "yvypoty-491e8.firebasestorage.app",
    messagingSenderId: "338156073833",
    appId: "1:338156073833:web:ca0d8ede1456dad29243f8",
    measurementId: "G-W93E7TJ59V"};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('btnEntrar').onclick = async () => {
            const nome = document.getElementById('nome').value.trim();
            if (nome) {
                await setDoc(doc(db, "jogadores", nome), { acertos: 0, status: "online" });
                localStorage.setItem("usuario", nome);
                window.location.href = "jogo.html";
            }
        };
    </script>
</body>
</html>
