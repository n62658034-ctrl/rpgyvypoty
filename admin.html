<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Controle Total</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .admin-card { background: #16213e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; border: 1px solid #0f3460; margin-bottom: 20px; }
        h2 { color: #e94560; text-align: center; margin-bottom: 10px; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #add8e6; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: none; background: #0f3460; color: white; box-sizing: border-box; }
        
        .btn-salvar { width: 100%; padding: 15px; margin-top: 20px; background: #e94560; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-salvar:hover { background: #ff4d6d; }
        .btn-apagar-tudo { width: 100%; padding: 15px; margin-top: 10px; background: transparent; color: #ff7979; border: 1px solid #ff7979; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-apagar-tudo:hover { background: #ff7979; color: white; }
        
        /* Estilos da Lista de Perguntas */
        .lista-container { background: #16213e; padding: 20px; border-radius: 15px; width: 100%; max-width: 600px; }
        .item-pergunta { background: #0f3460; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .item-text { width: 70%; }
        .item-text span { font-size: 12px; color: #add8e6; display: block; }
        .acoes { display: flex; gap: 10px; }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; }
        .btn-del { background: #c0392b; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2 id="titulo-form">📝 Cadastrar Nova Pergunta</h2>
    
    <label>Enunciado da Pergunta:</label>
    <input type="text" id="txt-pergunta" placeholder="Ex: Qual a fórmula da água?">

    <div style="border: 1px solid #1f4068; padding: 15px; border-radius: 10px; margin-top: 10px;">
        <input type="text" id="opt0" placeholder="Opção 0 (A)">
        <input type="text" id="opt1" placeholder="Opção 1 (B)">
        <input type="text" id="opt2" placeholder="Opção 2 (C)">
        <input type="text" id="opt3" placeholder="Opção 3 (D)">
    </div>

    <label>Alternativa Correta:</label>
    <select id="select-correta">
        <option value="0">Opção 0 (A)</option> <option value="1">Opção 1 (B)</option>
        <option value="2">Opção 2 (C)</option> <option value="3">Opção 3 (D)</option>
    </select>

    <button class="btn-salvar" id="btnSalvar">➕ SALVAR PERGUNTA</button>
    <button class="btn-apagar-tudo" onclick="apagarTodasPerguntas()">🗑️ APAGAR TODAS AS PERGUNTAS</button>
</div>

<div class="lista-container">
    <h3 style="color: #add8e6; text-align: center;">📋 Perguntas Salvas no Banco</h3>
    <div id="lista-render">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        /* COLOQUE SUAS CHAVES AQUI */
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let editandoId = null; // Variável que avisa se estamos criando ou editando

    // --- SALVAR OU EDITAR ---
    document.getElementById('btnSalvar').onclick = async () => {
        const p = document.getElementById('txt-pergunta').value;
        const o0 = document.getElementById('opt0').value;
        const o1 = document.getElementById('opt1').value;
        const o2 = document.getElementById('opt2').value;
        const o3 = document.getElementById('opt3').value;
        const correta = parseInt(document.getElementById('select-correta').value);

        if (!p || !o0 || !o1) { alert("Preencha o enunciado e as opções!"); return; }

        const dados = { enunciado: p, opcoes: [o0, o1, o2, o3], correta: correta };

        try {
            if (editandoId) {
                // Modo Edição: Atualiza a pergunta existente
                await updateDoc(doc(db, "perguntas", editandoId), dados);
                alert("✅ Pergunta atualizada!");
                editandoId = null;
                document.getElementById('titulo-form').innerText = "📝 Cadastrar Nova Pergunta";
                document.getElementById('btnSalvar').innerText = "➕ SALVAR PERGUNTA";
                document.getElementById('btnSalvar').style.background = "#e94560";
            } else {
                // Modo Novo: Cria uma pergunta do zero
                await addDoc(collection(db, "perguntas"), dados);
                alert("✅ Pergunta criada!");
            }
            limparFormulario();
        } catch (error) { alert("Erro ao salvar."); }
    };

    function limparFormulario() {
        document.getElementById('txt-pergunta').value = "";
        document.getElementById('opt0').value = ""; document.getElementById('opt1').value = "";
        document.getElementById('opt2').value = ""; document.getElementById('opt3').value = "";
    }

    // --- LISTAR EM TEMPO REAL ---
    onSnapshot(collection(db, "perguntas"), (snapshot) => {
        const painel = document.getElementById('lista-render');
        painel.innerHTML = "";
        
        if(snapshot.empty) { painel.innerHTML = "<p style='text-align:center;'>Nenhuma pergunta cadastrada.</p>"; return; }

        snapshot.forEach((documento) => {
            const id = documento.id;
            const q = documento.data();
            
            const div = document.createElement('div');
            div.className = "item-pergunta";
            div.innerHTML = `
                <div class="item-text">
                    <strong>${q.enunciado}</strong>
                    <span>Correta: Opção ${q.correta} (${q.opcoes[q.correta]})</span>
                </div>
                <div class="acoes">
                    <button class="btn-edit" onclick="prepararEdicao('${id}', '${q.enunciado.replace(/'/g, "\\'")}', '${q.opcoes[0]}', '${q.opcoes[1]}', '${q.opcoes[2]}', '${q.opcoes[3]}', ${q.correta})">✏️ Editar</button>
                    <button class="btn-del" onclick="anularPergunta('${id}')">🗑️ Anular</button>
                </div>
            `;
            painel.appendChild(div);
        });
    });

    // --- FUNÇÕES DOS BOTÕES DA LISTA ---
    window.prepararEdicao = (id, en, o0, o1, o2, o3, cor) => {
        editandoId = id;
        document.getElementById('txt-pergunta').value = en;
        document.getElementById('opt0').value = o0;
        document.getElementById('opt1').value = o1;
        document.getElementById('opt2').value = o2;
        document.getElementById('opt3').value = o3;
        document.getElementById('select-correta').value = cor;
        
        document.getElementById('titulo-form').innerText = "✏️ Editando Pergunta";
        document.getElementById('btnSalvar').innerText = "🔄 ATUALIZAR PERGUNTA";
        document.getElementById('btnSalvar').style.background = "#f39c12";
        window.scrollTo(0, 0); // Rola a página para cima
    }

    window.anularPergunta = async (id) => {
        if(confirm("Tem certeza que deseja apagar esta pergunta específica?")) {
            await deleteDoc(doc(db, "perguntas", id));
        }
    }

    window.apagarTodasPerguntas = async () => {
        if (confirm("⚠️ TEM CERTEZA? Isso vai apagar TODAS as perguntas do banco!")) {
            const querySnapshot = await getDocs(collection(db, "perguntas"));
            const promessas = querySnapshot.docs.map(d => deleteDoc(doc(db, "perguntas", d.id)));
            await Promise.all(promessas);
        }
    }
</script>
</body>
</html>
