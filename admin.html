<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {apiKey: "AIzaSyAtKHigv0ghzwzMilQ1y0NTebpmaI2yE2A",
    authDomain: "yvypoty-491e8.firebaseapp.com",
    projectId: "yvypoty-491e8",
    storageBucket: "yvypoty-491e8.firebasestorage.app",
    messagingSenderId: "338156073833",
    appId: "1:338156073833:web:ca0d8ede1456dad29243f8",
    measurementId: "G-W93E7TJ59V"};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.salvarQuestao = async () => {
        const q = {
            enunciado: document.getElementById('txt').value,
            opcoes: [document.getElementById('o0').value, document.getElementById('o1').value],
            correta: parseInt(document.getElementById('correta').value)
        };
        await addDoc(collection(db, "perguntas"), q);
        alert("Pergunta salva!");
    }
</script>
<input id="txt" placeholder="Pergunta">
<input id="o0" placeholder="Opção 0">
<input id="o1" placeholder="Opção 1">
<input id="correta" placeholder="Index da correta (0 ou 1)">

<button onclick="salvarQuestao()">Enviar</button>
