<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Comando do Professor</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header-prof { background: #16213e; width: 100%; max-width: 800px; padding: 20px; border-radius: 15px; text-align: center; border: 2px solid #e94560; margin-bottom: 20px;}
        
        /* BOTÕES GIGANTES */
        .grid-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 800px; margin-bottom: 30px; }
        .btn-gigante { padding: 30px; font-size: 20px; font-weight: bold; border-radius: 15px; cursor: pointer; border: none; display: flex; flex-direction: column; align-items: center; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .btn-gigante:hover { transform: translateY(-5px); }
        
        .btn-abrir { background: linear-gradient(45deg, #2980b9, #8e44ad); color: white; }
        .btn-play { background: linear-gradient(45deg, #27ae60, #2ecc71); color: white; }
        .btn-pause { background: linear-gradient(45deg, #c0392b, #e74c3c); color: white; }
        .icon-btn { font-size: 40px; margin-bottom: 10px; }

        /* AREA DE CADASTRO FICA ESCONDIDA ATÉ CLICAR */
        #area-cadastro { display: none; background: #16213e; padding: 30px; border-radius: 15px; width: 100%; max-width: 800px; border: 1px solid #0f3460; }
        input, select { width: 100%; padding: 12px; margin: 5px 0 15px 0; border-radius: 8px; border: none; background: #0f3460; color: white; box-sizing: border-box;}
        .btn-salvar { width: 100%; padding: 15px; background: #e94560; color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-prof">
    <h1 style="margin:0;">Painel de Controle: <span id="nome-sala" style="color:#ffd700; text-transform: uppercase;"></span></h1>
    <p>Selecione o cenário da batalha de hoje:</p>
    <select id="select-tema" style="max-width: 400px; margin: 0 auto; display: block;">
        <option value="tema-pixel">🍄 Castelo Retrô (Anos 90)</option>
        <option value="tema-dino">🦖 Mundo dos Dinossauros</option>
        <option value="tema-scifi">🚀 Ficção Científica (Neon)</option>
        <option value="tema-corrida">🏃‍♂️ Arena de Corrida Clássica</option>
    </select>
</div>

<div class="grid-botoes">
    <button class="btn-gigante btn-abrir" onclick="abrirCampoDeBatalha()">
        <span class="icon-btn">🏟️</span> ABRIR CAMPO DE BATALHA
    </button>
    
    <button class="btn-gigante btn-play" id="btn-estado-jogo" onclick="alternarPlay()">
        <span class="icon-btn">▶️</span> DAR PLAY NAS PERGUNTAS
    </button>

    <button class="btn-gigante" style="background:#f39c12; color:black;" onclick="mostrarCadastro()">
        <span class="icon-btn">📝</span> CADASTRAR PERGUNTAS
    </button>

    <button class="btn-gigante" style="background:#555; color:white;" onclick="limparTurma()">
        <span class="icon-btn">🧹</span> ZERAR PONTOS DA SALA
    </button>
</div>

<div id="area-cadastro">
    <h2>Cadastrar Nova Pergunta</h2>
    <label>Enunciado:</label> <input type="text" id="txt-pergunta">
    <label>Opções (A, B, C, D):</label>
    <div style="display:flex; gap:10px;">
        <input type="text" id="opt0" placeholder="A"> <input type="text" id="opt1" placeholder="B">
        <input type="text" id="opt2" placeholder="C"> <input type="text" id="opt3" placeholder="D">
    </div>
    <label>Correta:</label>
    <select id="select-correta">
        <option value="0">Opção A</option> <option value="1">Opção B</option>
        <option value="2">Opção C</option> <option value="3">Opção D</option>
    </select>
    <button class="btn-salvar" id="btnSalvar">SALVAR PERGUNTA NO BANCO</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, addDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {apiKey: "AIzaSyAtKHigv0ghzwzMilQ1y0NTebpmaI2yE2A",
    authDomain: "yvypoty-491e8.firebaseapp.com",
    projectId: "yvypoty-491e8",
    storageBucket: "yvypoty-491e8.firebasestorage.app",
    messagingSenderId: "338156073833",
    appId: "1:338156073833:web:ca0d8ede1456dad29243f8",
    measurementId: "G-W93E7TJ59V"};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const disciplina = localStorage.getItem("disciplinaAtiva");
    if(!disciplina) { window.location.href = "index.html"; }
    document.getElementById('nome-sala').innerText = disciplina;

    let jogoRodando = false;

    // ABRIR CAMPO (Nova Janela)
    window.abrirCampoDeBatalha = () => {
        const tema = document.getElementById('select-tema').value;
        localStorage.setItem("temaAtivo", tema); // Salva o tema para a dashboard ler
        window.open("dashboard.html", "_blank"); // Abre em nova guia
    }

    // O "SEMÁFORO" DO PLAY E PAUSE
    window.alternarPlay = async () => {
        jogoRodando = !jogoRodando;
        await setDoc(doc(db, "salas", disciplina, "configuracao", "estado"), { jogando: jogoRodando }, { merge: true });
        
        const btn = document.getElementById('btn-estado-jogo');
        if(jogoRodando) {
            btn.className = "btn-gigante btn-pause";
            btn.innerHTML = `<span class="icon-btn">⏸️</span> PAUSAR PERGUNTAS`;
        } else {
            btn.className = "btn-gigante btn-play";
            btn.innerHTML = `<span class="icon-btn">▶️</span> DAR PLAY NAS PERGUNTAS`;
        }
    }

    // LÓGICA DO CADASTRO
    window.mostrarCadastro = () => {
        const area = document.getElementById('area-cadastro');
        area.style.display = area.style.display === 'block' ? 'none' : 'block';
    }

    document.getElementById('btnSalvar').onclick = async () => {
        const p = document.getElementById('txt-pergunta').value;
        const o0 = document.getElementById('opt0').value; const o1 = document.getElementById('opt1').value;
        const o2 = document.getElementById('opt2').value; const o3 = document.getElementById('opt3').value;
        const correta = parseInt(document.getElementById('select-correta').value);

        if (p && o0 && o1) {
            await addDoc(collection(db, "salas", disciplina, "perguntas"), { enunciado: p, opcoes: [o0, o1, o2, o3], correta: correta });
            alert("Pergunta Salva!");
            document.getElementById('txt-pergunta').value = ""; // Limpa campo
        }
    }

    window.limparTurma = async () => {
        if(confirm("Apagar pontos e heróis ocupados?")) {
            const queryJogadores = await getDocs(collection(db, "salas", disciplina, "jogadores"));
            queryJogadores.forEach(d => deleteDoc(doc(db, "salas", disciplina, "jogadores", d.id)));
            await setDoc(doc(db, "salas", disciplina, "configuracao", "personagens"), {});
            await setDoc(doc(db, "salas", disciplina, "configuracao", "estado"), { jogando: false }, { merge: true });
            alert("Turma zerada!");
            location.reload();
        }
    }
</script>
</body>
</html>
