<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Acesso Restrito</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* TELA DE LOGIN DO PROFESSOR */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0f3460; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #16213e; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 2px solid #e94560; }
        .login-box select, .login-box input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; font-size: 16px; border: none; }
        .login-box button { width: 100%; padding: 15px; background: #e94560; color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        
        /* PAINEL ADMIN (Fica escondido até logar) */
        #painel-admin { display: none; width: 100%; max-width: 600px; flex-direction: column; align-items: center; }
        .admin-card { background: #16213e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; border: 1px solid #0f3460; margin-bottom: 20px; }
        h2 { color: #e94560; text-align: center; margin-bottom: 10px; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #add8e6; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: none; background: #0f3460; color: white; box-sizing: border-box; }
        
        .btn-salvar { width: 100%; padding: 15px; margin-top: 20px; background: #e94560; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-apagar-tudo { width: 100%; padding: 15px; margin-top: 10px; background: transparent; color: #ff7979; border: 1px solid #ff7979; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .lista-container { background: #16213e; padding: 20px; border-radius: 15px; width: 100%; }
        .item-pergunta { background: #0f3460; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .item-text { width: 70%; }
        .item-text span { font-size: 12px; color: #add8e6; display: block; }
        .acoes { display: flex; gap: 10px; }
        .btn-edit, .btn-del { padding: 8px; border-radius: 5px; cursor: pointer; border: none; color: white; }
        .btn-edit { background: #f39c12; } .btn-del { background: #c0392b; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="margin-top:0;">👨‍🏫 Área do Professor</h2>
        <p>Selecione sua disciplina para acessar seu banco de questões.</p>
        
        <select id="select-disciplina">
            <option value="matematica">Matemática</option>
            <option value="portugues">Português</option>
            <option value="biologia">Biologia</option>
            <option value="historia">História</option>
            <option value="geografia">Geografia</option>
            <option value="fisica">Física</option>
            <option value="quimica">Química</option>
        </select>
        
        <input type="password" id="senha-prof" placeholder="Senha de Acesso">
        <button onclick="entrarPainel()">ACESSAR PAINEL</button>
    </div>
</div>

<div id="painel-admin">
    <div class="admin-card">
        <h2 id="titulo-form">📝 Disciplina: <span id="nome-disciplina-tela" style="color:white;">---</span></h2>
        
        <label>Enunciado da Pergunta:</label>
        <input type="text" id="txt-pergunta" placeholder="Ex: Qual a fórmula da água?">

        <div style="border: 1px solid #1f4068; padding: 15px; border-radius: 10px; margin-top: 10px;">
            <input type="text" id="opt0" placeholder="Opção 0 (A)">
            <input type="text" id="opt1" placeholder="Opção 1 (B)">
            <input type="text" id="opt2" placeholder="Opção 2 (C)">
            <input type="text" id="opt3" placeholder="Opção 3 (D)">
        </div>

        <label>Alternativa Correta:</label>
        <select id="select-correta">
            <option value="0">Opção 0 (A)</option> <option value="1">Opção 1 (B)</option>
            <option value="2">Opção 2 (C)</option> <option value="3">Opção 3 (D)</option>
        </select>

        <button class="btn-salvar" id="btnSalvar">➕ SALVAR PERGUNTA</button>
        <button class="btn-apagar-tudo" onclick="apagarTodasPerguntas()">🗑️ APAGAR TODAS DESTA DISCIPLINA</button>
    </div>

    <div class="lista-container">
        <h3 style="color: #add8e6; text-align: center;">📋 Perguntas da Sua Disciplina</h3>
        <div id="lista-render"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {apiKey: "AIzaSyAtKHigv0ghzwzMilQ1y0NTebpmaI2yE2A",
    authDomain: "yvypoty-491e8.firebaseapp.com",
    projectId: "yvypoty-491e8",
    storageBucket: "yvypoty-491e8.firebasestorage.app",
    messagingSenderId: "338156073833",
    appId: "1:338156073833:web:ca0d8ede1456dad29243f8",
    measurementId: "G-W93E7TJ59V"};
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let editandoId = null; 
    let salaAtual = ""; // Variável mágica que separa as disciplinas

    // --- SISTEMA DE LOGIN SIMPLES ---
    window.entrarPainel = () => {
        const senha = document.getElementById('senha-prof').value;
        const disciplina = document.getElementById('select-disciplina').value;
        const nomeDisplay = document.getElementById('select-disciplina').options[document.getElementById('select-disciplina').selectedIndex].text;

        // Senha padrão para todos os professores (Você pode mudar aqui)
        if(senha === "1234") {
            salaAtual = disciplina;
            document.getElementById('nome-disciplina-tela').innerText = nomeDisplay;
            document.getElementById('login-overlay').style.display = "none";
            document.getElementById('painel-admin').style.display = "flex";
            
            // Só começa a carregar a lista do Firebase DEPOIS que ele escolher a matéria
            carregarListaEmTempoReal();
        } else {
            alert("Senha incorreta!");
        }
    }

    // --- SALVAR OU EDITAR NA SALA CERTA ---
    document.getElementById('btnSalvar').onclick = async () => {
        const p = document.getElementById('txt-pergunta').value;
        const o0 = document.getElementById('opt0').value;
        const o1 = document.getElementById('opt1').value;
        const o2 = document.getElementById('opt2').value;
        const o3 = document.getElementById('opt3').value;
        const correta = parseInt(document.getElementById('select-correta').value);

        if (!p || !o0 || !o1) { alert("Preencha o enunciado e as opções!"); return; }

        const dados = { enunciado: p, opcoes: [o0, o1, o2, o3], correta: correta };

        try {
            // NOTA: Agora salvamos dentro de "salas / nomedamateria / perguntas"
            if (editandoId) {
                await updateDoc(doc(db, "salas", salaAtual, "perguntas", editandoId), dados);
                alert("✅ Pergunta atualizada!");
                editandoId = null;
                document.getElementById('btnSalvar').innerText = "➕ SALVAR PERGUNTA";
                document.getElementById('btnSalvar').style.background = "#e94560";
            } else {
                await addDoc(collection(db, "salas", salaAtual, "perguntas"), dados);
                alert("✅ Pergunta criada na disciplina de " + salaAtual.toUpperCase() + "!");
            }
            limparFormulario();
        } catch (error) { alert("Erro ao salvar: " + error); }
    };

    function limparFormulario() {
        document.getElementById('txt-pergunta').value = "";
        document.getElementById('opt0').value = ""; document.getElementById('opt1').value = "";
        document.getElementById('opt2').value = ""; document.getElementById('opt3').value = "";
    }

    // --- CARREGAR APENAS AS PERGUNTAS DESTA DISCIPLINA ---
    function carregarListaEmTempoReal() {
        onSnapshot(collection(db, "salas", salaAtual, "perguntas"), (snapshot) => {
            const painel = document.getElementById('lista-render');
            painel.innerHTML = "";
            
            if(snapshot.empty) { painel.innerHTML = "<p style='text-align:center;'>Nenhuma pergunta cadastrada nesta disciplina.</p>"; return; }

            snapshot.forEach((documento) => {
                const id = documento.id;
                const q = documento.data();
                
                const div = document.createElement('div');
                div.className = "item-pergunta";
                div.innerHTML = `
                    <div class="item-text">
                        <strong>${q.enunciado}</strong>
                        <span>Correta: Opção ${q.correta}</span>
                    </div>
                    <div class="acoes">
                        <button class="btn-edit" onclick="prepararEdicao('${id}', '${q.enunciado.replace(/'/g, "\\'")}', '${q.opcoes[0]}', '${q.opcoes[1]}', '${q.opcoes[2]}', '${q.opcoes[3]}', ${q.correta})">✏️</button>
                        <button class="btn-del" onclick="anularPergunta('${id}')">🗑️</button>
                    </div>
                `;
                painel.appendChild(div);
            });
        });
    }

    window.prepararEdicao = (id, en, o0, o1, o2, o3, cor) => {
        editandoId = id;
        document.getElementById('txt-pergunta').value = en;
        document.getElementById('opt0').value = o0;
        document.getElementById('opt1').value = o1;
        document.getElementById('opt2').value = o2;
        document.getElementById('opt3').value = o3;
        document.getElementById('select-correta').value = cor;
        
        document.getElementById('btnSalvar').innerText = "🔄 ATUALIZAR PERGUNTA";
        document.getElementById('btnSalvar').style.background = "#f39c12";
        window.scrollTo(0, 0); 
    }

    window.anularPergunta = async (id) => {
        if(confirm("Apagar esta pergunta específica?")) {
            await deleteDoc(doc(db, "salas", salaAtual, "perguntas", id));
        }
    }

    window.apagarTodasPerguntas = async () => {
        if (confirm("⚠️ TEM CERTEZA? Isso vai apagar TODAS as perguntas desta disciplina!")) {
            const querySnapshot = await getDocs(collection(db, "salas", salaAtual, "perguntas"));
            const promessas = querySnapshot.docs.map(d => deleteDoc(doc(db, "salas", salaAtual, "perguntas", d.id)));
            await Promise.all(promessas);
        }
    }
</script>
</body>
</html>
