<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Cadastro de Missões</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .admin-card { background: #16213e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; border: 1px solid #0f3460; }
        h2 { color: #e94560; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #add8e6; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: none; background: #0f3460; color: white; box-sizing: border-box; }
        .btn-salvar { width: 100%; padding: 15px; margin-top: 30px; background: #e94560; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-salvar:hover { background: #ff4d6d; transform: scale(1.02); }
        .opcoes-group { border: 1px solid #1f4068; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .nav-link { display: block; text-align: center; margin-top: 20px; color: #8e44ad; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>📝 Cadastrar Pergunta</h2>
    
    <label>Enunciado da Pergunta:</label>
    <input type="text" id="txt-pergunta" placeholder="Ex: Qual a fórmula da água?">

    <div class="opcoes-group">
        <label>Opção 0 (A):</label>
        <input type="text" id="opt0" placeholder="Resposta A">
        
        <label>Opção 1 (B):</label>
        <input type="text" id="opt1" placeholder="Resposta B">
        
        <label>Opção 2 (C):</label>
        <input type="text" id="opt2" placeholder="Resposta C">
        
        <label>Opção 3 (D):</label>
        <input type="text" id="opt3" placeholder="Resposta D">
    </div>

    <label>Qual é a alternativa correta?</label>
    <select id="select-correta">
        <option value="0">Opção 0 (A)</option>
        <option value="1">Opção 1 (B)</option>
        <option value="2">Opção 2 (C)</option>
        <option value="3">Opção 3 (D)</option>
    </select>

    <button class="btn-salvar" id="btnSalvar">SALVAR NO BANCO DE DADOS</button>
    
    <a href="dashboard.html" class="nav-link">Voltar para a Arena 🏟️</a>
</div>

<script type="module">
    // --- IMPORTAÇÕES DO FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {apiKey: "AIzaSyAtKHigv0ghzwzMilQ1y0NTebpmaI2yE2A",
    authDomain: "yvypoty-491e8.firebaseapp.com",
    projectId: "yvypoty-491e8",
    storageBucket: "yvypoty-491e8.firebasestorage.app",
    messagingSenderId: "338156073833",
    appId: "1:338156073833:web:ca0d8ede1456dad29243f8",
    measurementId: "G-W93E7TJ59V"};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- FUNÇÃO PARA SALVAR ---
    document.getElementById('btnSalvar').onclick = async () => {
        const pergunta = document.getElementById('txt-pergunta').value;
        const o0 = document.getElementById('opt0').value;
        const o1 = document.getElementById('opt1').value;
        const o2 = document.getElementById('opt2').value;
        const o3 = document.getElementById('opt3').value;
        const corretaIndex = parseInt(document.getElementById('select-correta').value);

        // Validação simples
        if (!pergunta || !o0 || !o1) {
            alert("Por favor, preencha a pergunta e pelo menos duas opções!");
            return;
        }

        const novaQuestao = {
            enunciado: pergunta,
            opcoes: [o0, o1, o2, o3],
            correta: corretaIndex,
            timestamp: Date.now() // Útil para organizar as perguntas se quiser
        };

        try {
            await addDoc(collection(db, "perguntas"), novaQuestao);
            alert("✅ Pergunta cadastrada com sucesso!");
            
            // Limpa os campos para a próxima pergunta
            document.getElementById('txt-pergunta').value = "";
            document.getElementById('opt0').value = "";
            document.getElementById('opt1').value = "";
            document.getElementById('opt2').value = "";
            document.getElementById('opt3').value = "";
        } catch (error) {
            console.error("Erro ao salvar:", error);
            alert("❌ Erro ao salvar no Firebase. Verifique o console.");
        }
    };
</script>

</body>
</html>
